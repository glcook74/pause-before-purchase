<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>Dopamine Delay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #faf9f6;
      color: #1a1a1a;
    }

    /* Sign-in screen */
    #auth-screen {
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #auth-screen h2 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      text-align: center;
    }
    #auth-screen input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #d4d4d4;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #auth-screen input:focus {
      border-color: #2ba5a5;
    }
    #auth-error {
      color: #d94848;
      font-size: 12px;
      text-align: center;
      display: none;
    }
    .btn-signin {
      width: 100%;
      padding: 11px;
      background: #2ba5a5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-signin:hover { background: #249090; }
    .btn-signin:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-links {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .auth-links a {
      font-size: 12px;
      color: #2ba5a5;
      text-decoration: none;
      cursor: pointer;
    }
    .auth-links a:hover { text-decoration: underline; }
    .auth-links .muted {
      color: #999;
    }

    /* Main extension content (your existing popup content goes here) */
    #main-screen {
      display: none;
    }
    .signed-in-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      background: #f0f0f0;
      font-size: 11px;
      color: #666;
    }
    .signed-in-bar a {
      color: #d94848;
      text-decoration: none;
      cursor: pointer;
      font-size: 11px;
    }
    .signed-in-bar a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Auth screen: shown when no session -->
  <div id="auth-screen">
    <h2>Sign in to sync your points</h2>
    <input type="email" id="auth-email" placeholder="Email" autocomplete="email" />
    <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password" />
    <p id="auth-error"></p>
    <button class="btn-signin" id="btn-signin">Sign in</button>
    <div class="auth-links">
      <a id="link-signup">Create account</a>
      <a id="link-skip" class="muted">Use without account</a>
    </div>
  </div>

  <!-- Main screen: shown when signed in or skipped -->
      <div id="main-screen" style="display:none;">
  <!-- Points summary -->
  <div style="background:#2A7D6B;color:white;padding:16px;text-align:center;">
    <div style="font-size:36px;font-weight:bold;" id="points-display">0</div>
    <div style="font-size:12px;opacity:0.9;">Delay Points</div>
    <div style="display:flex;justify-content:center;gap:16px;margin-top:8px;font-size:12px;">
      <span>🔥 <span id="streak-display">0</span> day streak</span>
      <span>⏸ <span id="pauses-display">0</span> pauses</span>
    </div>
  </div>
  <!-- Tabs -->
  <div style="display:flex;border-bottom:1px solid #E8E2D9;">
    <button onclick="showTab('today')" id="tab-today" style="flex:1;padding:8px;border:none;background:#F5F0E8;cursor:pointer;font-size:12px;color:#2A7D6B;font-weight:600;">Today</button>
    <button onclick="showTab('saved')" id="tab-saved" style="flex:1;padding:8px;border:none;background:white;cursor:pointer;font-size:12px;color:#666;">Saved</button>
    <button onclick="showTab('settings')" id="tab-settings" style="flex:1;padding:8px;border:none;background:white;cursor:pointer;font-size:12px;color:#666;">Settings</button>
  </div>
  <!-- Today tab -->
  <div id="panel-today" style="padding:12px;">
    <div style="font-size:12px;color:#666;text-align:center;padding:8px;">
      Your pauses will appear here as you shop. 🛒
    </div>
    <a href="https://dopaminedelay.com/dashboard" target="_blank" 
       style="display:block;text-align:center;margin-top:8px;padding:8px;background:#2A7D6B;color:white;border-radius:6px;text-decoration:none;font-size:12px;">
      View full dashboard →
    </a>
  </div>
  <!-- Saved tab -->
  <div id="panel-saved" style="display:none;padding:12px;">
    <div id="saved-list" style="font-size:12px;color:#666;text-align:center;padding:8px;">
      Items you save for later appear here.
    </div>
  </div>
  <!-- Settings tab -->
  <div id="panel-settings" style="display:none;padding:12px;font-size:12px;">
    <div style="margin-bottom:8px;color:#666;">Pause duration</div>
    <select id="pause-duration" style="width:100%;padding:6px;border:1px solid #E8E2D9;border-radius:4px;margin-bottom:12px;">
      <option value="10">10 seconds</option>
      <option value="30">30 seconds</option>
      <option value="60">60 seconds</option>
    </select>
    <a href="https://dopaminedelay.com/dashboard" target="_blank"
       style="display:block;text-align:center;padding:8px;background:#F5F0E8;color:#2A7D6B;border-radius:6px;text-decoration:none;font-size:12px;border:1px solid #2A7D6B;">
      Full dashboard & account settings →
    </a>
  </div>
</div>
  </div>

  <script src="supabase-config.js"></script>
  <script src="supabase.js"></script>
  <script src="popup.js"></script>
</body>
</html>
