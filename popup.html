<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pause Before Purchase</title>
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="popup-container">
    <header>
      <h1>Pause Before Purchase</h1>
      <p class="subtitle">Mindful spending companion</p>
    </header>

    <section class="stats-section">
      <h2>Your Progress</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-number" id="pauses-today">0</span>
          <span class="stat-label">Pauses Today</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="impulse-caught">0</span>
          <span class="stat-label">Impulse Catches</span>
        </div>
        <div class="stat-card saved">
          <span class="stat-number" id="proceeded-count">0</span>
          <span class="stat-label">Proceeded After Reflection</span>
        </div>
      </div>
    </section>

    <section class="settings-section">
      <h2>Settings</h2>

      <div class="setting-row">
        <label for="toggle-enabled">Extension Enabled</label>
        <label class="toggle">
          <input type="checkbox" id="toggle-enabled" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="setting-row">
        <label for="cooldown-time">Impulse Cooldown (minutes)</label>
        <select id="cooldown-time">
          <option value="5">5 min</option>
          <option value="10" selected>10 min</option>
          <option value="15">15 min</option>
          <option value="30">30 min</option>
          <option value="60">1 hour</option>
          <option value="1440">24 hours</option>
        </select>
      </div>

      <div class="setting-row">
        <label for="planned-cooldown">Planned Purchase Cooldown (minutes)</label>
        <select id="planned-cooldown">
          <option value="0">No cooldown</option>
          <option value="2" selected>2 min</option>
          <option value="5">5 min</option>
          <option value="10">10 min</option>
        </select>
      </div>

      <button id="reset-stats" class="reset-btn">Reset Stats</button>
    </section>

    <footer>
      <p>Take a breath. You're in control.</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
