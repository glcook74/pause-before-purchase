<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>Dopamine Delay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #faf9f6;
      color: #1a1a1a;
    }
    #auth-screen {
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #auth-screen h2 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      text-align: center;
    }
    #auth-screen input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #E8E2D9;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }
    #auth-screen input:focus { border-color: #2A7D6B; }
    .btn-signin {
      width: 100%;
      padding: 10px;
      background: #2A7D6B;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-signin:hover { background: #236858; }
    .auth-links {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }
    .auth-links a { color: #2A7D6B; cursor: pointer; text-decoration: none; }
    .muted { color: #999 !important; }
    #auth-error {
      color: #c0392b;
      font-size: 12px;
      text-align: center;
      display: none;
    }
    #signed-in-bar {
      display: none;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: #2A7D6B;
      color: white;
      font-size: 12px;
    }
    #signed-in-bar a { color: #C9921A; cursor: pointer; text-decoration: none; font-size: 11px; }
    .points-hero {
      background: #2A7D6B;
      color: white;
      padding: 16px;
      text-align: center;
    }
    .points-number {
      font-size: 36px;
      font-weight: bold;
      font-family: Georgia, serif;
      color: #C9921A;
    }
    .points-label { font-size: 11px; opacity: 0.9; margin-top: 2px; }
    .stats-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.95;
    }
    .tab-bar {
      display: flex;
      border-bottom: 1px solid #E8E2D9;
      background: white;
    }
    .tab-btn {
      flex: 1;
      padding: 8px;
      border: none;
      background: white;
      cursor: pointer;
      font-size: 12px;
      color: #666;
    }
    .tab-btn.active {
      background: #F5F0E8;
      color: #2A7D6B;
      font-weight: 600;
      border-bottom: 2px solid #2A7D6B;
    }
    .tab-panel { padding: 12px; display: none; }
    .tab-panel.active { display: block; }
    .dashboard-link {
      display: block;
      text-align: center;
      margin-top: 10px;
      padding: 8px;
      background: #2A7D6B;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-size: 12px;
    }
    .empty-state {
      font-size: 12px;
      color: #999;
      text-align: center;
      padding: 12px 8px;
    }
    select {
      width: 100%;
      padding: 6px;
      border: 1px solid #E8E2D9;
      border-radius: 4px;
      margin-bottom: 10px;
      font-size: 12px;
    }
    .settings-label { font-size: 12px; color: #666; margin-bottom: 4px; }
  </style>
</head>
<body>

  <!-- Auth screen -->
  <div id="auth-screen">
    <h2>Sign in to sync your points</h2>
    <input type="email" id="auth-email" placeholder="Email" autocomplete="email" />
    <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password" />
    <p id="auth-error"></p>
    <button class="btn-signin" id="btn-signin">Sign in</button>
    <div class="auth-links">
      <a id="link-signup">Create account</a>
      <a id="link-skip" class="muted">Use without account</a>
    </div>
  </div>

  <!-- Main screen -->
  <div id="main-screen" style="display:none;">

    <!-- Signed in bar -->
    <div id="signed-in-bar">
      <span id="user-email"></span>
      <a id="link-signout">Sign out</a>
    </div>

    <!-- Points hero -->
    <div class="points-hero">
      <div class="points-number" id="points-display">0</div>
      <div class="points-label">Delay Points</div>
      <div class="stats-row">
        <span>🔥 <span id="streak-display">0</span> day streak</span>
        <span>⏸ <span id="pauses-display">0</span> pauses</span>
      </div>
    </div>

    <!-- Tab bar -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-today">Today</button>
      <button class="tab-btn" id="tab-saved">Saved</button>
      <button class="tab-btn" id="tab-settings">Settings</button>
    </div>

    <!-- Today panel -->
    <div class="tab-panel active" id="panel-today">
      <div class="empty-state">Your pauses will appear here as you shop. 🛒</div>
      <a class="dashboard-link" href="https://dopaminedelay.com/dashboard" target="_blank">
        View full dashboard →
      </a>
    </div>

    <!-- Saved panel -->
    <div class="tab-panel" id="panel-saved">
      <div id="saved-list" class="empty-state">
        Items you save for later appear here.
      </div>
    </div>

    <!-- Settings panel -->
    <div class="tab-panel" id="panel-settings">
      <div class="settings-label">Pause duration</div>
      <select id="pause-duration">
        <option value="10">10 seconds</option>
        <option value="30">30 seconds</option>
        <option value="60">60 seconds</option>
      </select>
      <a class="dashboard-link" href="https://dopaminedelay.com/dashboard" target="_blank"
         style="background:#F5F0E8;color:#2A7D6B;border:1px solid #2A7D6B;">
        Account settings →
      </a>
    </div>

  </div>

  <script src="supabase.js"></script>
  <script src="supabase-config.js"></script>
  <script src="supabase-client.js"></script>
  <script src="popup.js"></script>
</body>
</html>
