<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>Dopamine Delay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #faf9f6;
      color: #1a1a1a;
    }

    /* Sign-in screen */
    #auth-screen {
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #auth-screen h2 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      text-align: center;
    }
    #auth-screen input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #d4d4d4;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #auth-screen input:focus {
      border-color: #2ba5a5;
    }
    #auth-error {
      color: #d94848;
      font-size: 12px;
      text-align: center;
      display: none;
    }
    .btn-signin {
      width: 100%;
      padding: 11px;
      background: #2ba5a5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-signin:hover { background: #249090; }
    .btn-signin:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-links {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .auth-links a {
      font-size: 12px;
      color: #2ba5a5;
      text-decoration: none;
      cursor: pointer;
    }
    .auth-links a:hover { text-decoration: underline; }
    .auth-links .muted {
      color: #999;
    }

    /* Main extension content (your existing popup content goes here) */
    #main-screen {
      display: none;
    }
    .signed-in-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      background: #f0f0f0;
      font-size: 11px;
      color: #666;
    }
    .signed-in-bar a {
      color: #d94848;
      text-decoration: none;
      cursor: pointer;
      font-size: 11px;
    }
    .signed-in-bar a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Auth screen: shown when no session -->
  <div id="auth-screen">
    <h2>Sign in to sync your points</h2>
    <input type="email" id="auth-email" placeholder="Email" autocomplete="email" />
    <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password" />
    <p id="auth-error"></p>
    <button class="btn-signin" id="btn-signin">Sign in</button>
    <div class="auth-links">
      <a id="link-signup">Create account</a>
      <a id="link-skip" class="muted">Use without account</a>
    </div>
  </div>

  <!-- Main screen: shown when signed in or skipped -->
  <div id="main-screen">
    <div class="signed-in-bar" id="signed-in-bar" style="display:none;">
      <span id="user-email"></span>
      <a id="link-signout">Sign out</a>
    </div>
    <!-- 
      Your existing popup content goes below this line.
      The extension's normal UI (points display, pause history, etc.)
      should be placed here or loaded dynamically.
    -->
    <div style="padding: 20px; text-align: center; color: #666; font-size: 13px;">
      Extension content loads here
    </div>
  </div>

  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
